<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Filter</title>
  <style>
    body {
      margin: 0;
      padding: 12px;
      width: 260px;
      font-family: Arial, sans-serif;
      background: #111827;
      color: #f9fafb;
    }

    .card {
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 12px;
      background: #1f2937;
    }

    .title {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 700;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .hint {
      margin-top: 8px;
      font-size: 11px;
      color: #9ca3af;
      line-height: 1.4;
    }

    .field {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 12px;
      color: #d1d5db;
    }

    .field textarea {
      min-height: 52px;
      resize: vertical;
      border: 1px solid #4b5563;
      border-radius: 8px;
      background: #111827;
      color: #f9fafb;
      padding: 8px;
      font-size: 12px;
    }

    .buttonRow {
      margin-top: 10px;
      display: flex;
      justify-content: flex-end;
    }

    button {
      border: 1px solid #4b5563;
      background: #2563eb;
      color: #ffffff;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="title">Lyric Filter</p>
    <label class="row" for="censorToggle">
      <span id="toggleLabel">Censor N-word</span>
      <input id="censorToggle" type="checkbox" />
    </label>
    <p class="hint">
      When enabled, detected timestamps are muted in supported tabs.
    </p>
    <label class="row" for="debugOverlayToggle">
      <span>Show debug overlay</span>
      <input id="debugOverlayToggle" type="checkbox" />
    </label>
    <div class="field">
      <label for="blocklistTerms">Blocklist terms (comma separated)</label>
      <textarea id="blocklistTerms" placeholder="nigg"></textarea>
    </div>
    <div class="field">
      <label for="allowlistTerms">Allowlist terms (comma separated)</label>
      <textarea id="allowlistTerms" placeholder="nickname"></textarea>
    </div>
    <div class="buttonRow">
      <button id="saveButton" type="button">Save</button>
    </div>
    <p class="hint" id="saveStatus"></p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
